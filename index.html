<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0e2a">
  <title>달빛 도서관과 보리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="book/style.css">
</head>
<body>
  <div class="stars-bg" aria-hidden="true"></div>

  <header class="topbar">
    <div class="book-meta">
      <span id="meta-title">달빛 도서관과 보리</span>
    </div>
    <div class="top-actions">
      <button id="restart-btn" class="ghost-btn" title="처음부터">⟲</button>
      <button id="fullscreen-btn" class="ghost-btn" title="전체화면">⤢</button>
    </div>
  </header>

  <main id="book" class="book" tabindex="0" aria-label="동화책 본문">
    <div class="page-track" id="page-track"></div>
    <button class="edge-nav left" id="edge-prev" aria-label="이전 페이지" tabindex="-1"></button>
    <button class="edge-nav right" id="edge-next" aria-label="다음 페이지" tabindex="-1"></button>
  </main>

  <nav class="controls" aria-label="페이지 컨트롤">
    <button id="prev" class="nav-btn" aria-label="이전 페이지">◀ 이전</button>
    <div class="indicator-wrap">
      <span id="indicator">1 / 10</span>
      <div id="dots" class="dots" aria-hidden="true"></div>
    </div>
    <button id="next" class="nav-btn" aria-label="다음 페이지">다음 ▶</button>
  </nav>

  <script src="book/book.js"></script>
</body>
</html>
